<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사회주의의 역사 — T/F 특훈 100제</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0e0e14;
    --card: #16161f;
    --card2: #1c1c28;
    --border: #2a2a3d;
    --accent: #c8a96e;
    --accent2: #8b5cf6;
    --correct: #22c55e;
    --wrong: #ef4444;
    --text: #e8e4da;
    --muted: #8a8499;
    --tag: #2d2d40;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  header {
    background: linear-gradient(135deg, #0e0e14 0%, #1a1430 50%, #0e0e14 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% -10%, rgba(139,92,246,.25), transparent);
    pointer-events: none;
  }
  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: .04em;
    margin-bottom: 8px;
  }
  header p { color: var(--muted); font-size: .9rem; }

  /* ── 진행 바 ── */
  #progress-wrap {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  #progress-bar-outer {
    flex: 1; height: 6px; border-radius: 99px;
    background: var(--border); overflow: hidden;
  }
  #progress-bar-inner {
    height: 100%; background: var(--accent);
    border-radius: 99px;
    transition: width .4s ease;
    width: 0%;
  }
  #progress-text { font-size: .8rem; color: var(--muted); white-space: nowrap; }
  #score-display {
    display: flex; gap: 12px; font-size: .8rem;
  }
  .sc-o { color: var(--correct); font-weight: 600; }
  .sc-x { color: var(--wrong); font-weight: 600; }

  /* ── 탭 ── */
  #tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .tab-btn {
    flex: 1; padding: 12px 8px;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: .85rem;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all .2s;
    border-bottom: 2px solid transparent;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* ── 메인 컨텐츠 ── */
  #main-container { max-width: 780px; margin: 0 auto; padding: 0 16px 60px; }

  /* ── 문제 카드 ── */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-top: 20px;
    overflow: hidden;
    transition: border-color .3s;
  }
  .q-card.answered-correct { border-color: rgba(34,197,94,.4); }
  .q-card.answered-wrong   { border-color: rgba(239,68,68,.4); }

  .q-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px 0;
  }
  .q-num {
    background: var(--tag); border-radius: 99px;
    padding: 3px 10px; font-size: .75rem;
    color: var(--muted); font-weight: 600; letter-spacing: .05em;
    white-space: nowrap;
  }
  .q-tag {
    background: rgba(139,92,246,.15);
    border: 1px solid rgba(139,92,246,.3);
    border-radius: 99px;
    padding: 3px 9px; font-size: .72rem;
    color: #a78bfa;
  }
  .q-diff {
    margin-left: auto; font-size: .72rem;
  }
  .diff-easy   { color: #4ade80; }
  .diff-hard   { color: #f87171; }

  .q-body { padding: 14px 18px 0; }
  .q-sentence {
    font-size: 1rem; line-height: 1.75;
    font-family: 'Noto Serif KR', serif;
    font-weight: 400;
    color: var(--text);
  }
  .q-sentence em {
    font-style: normal;
    color: var(--accent);
    border-bottom: 1px dashed rgba(200,169,110,.4);
  }

  /* ── 버튼 ── */
  .q-actions {
    display: flex; gap: 10px;
    padding: 14px 18px;
  }
  .btn-tf {
    flex: 1; padding: 11px;
    border-radius: 8px; border: none; cursor: pointer;
    font-size: .95rem; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all .2s;
    letter-spacing: .02em;
  }
  .btn-t {
    background: rgba(34,197,94,.12);
    border: 1px solid rgba(34,197,94,.35);
    color: #4ade80;
  }
  .btn-t:hover:not(:disabled) {
    background: rgba(34,197,94,.25);
    transform: translateY(-1px);
  }
  .btn-f {
    background: rgba(239,68,68,.12);
    border: 1px solid rgba(239,68,68,.35);
    color: #f87171;
  }
  .btn-f:hover:not(:disabled) {
    background: rgba(239,68,68,.25);
    transform: translateY(-1px);
  }
  .btn-tf:disabled { opacity: .5; cursor: default; }
  .btn-tf.selected-correct { background: rgba(34,197,94,.35) !important; border-color: #22c55e !important; }
  .btn-tf.selected-wrong   { background: rgba(239,68,68,.35) !important; border-color: #ef4444 !important; }
  .btn-tf.reveal-answer    { background: rgba(250,204,21,.25) !important; border-color: #facc15 !important; color: #facc15 !important; }

  /* ── 해설 ── */
  .q-explanation {
    display: none;
    padding: 0 18px 18px;
  }
  .q-explanation.visible { display: block; }
  .exp-box {
    background: var(--card2);
    border-radius: 10px;
    padding: 14px 16px;
    border-left: 3px solid var(--accent);
  }
  .exp-result {
    font-size: .88rem; font-weight: 700;
    margin-bottom: 8px;
  }
  .exp-result.correct { color: var(--correct); }
  .exp-result.wrong   { color: var(--wrong); }
  .exp-answer { font-size: .82rem; color: #a78bfa; margin-bottom: 8px; }
  .exp-text   { font-size: .88rem; line-height: 1.7; color: #ccc5bb; }
  .exp-meta {
    margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px;
  }
  .exp-concept {
    background: rgba(200,169,110,.1);
    border: 1px solid rgba(200,169,110,.25);
    border-radius: 6px; padding: 3px 8px;
    font-size: .75rem; color: var(--accent);
  }
  .exp-source {
    background: rgba(139,92,246,.1);
    border: 1px solid rgba(139,92,246,.25);
    border-radius: 6px; padding: 3px 8px;
    font-size: .75rem; color: #a78bfa;
  }

  /* ── 틀린 문제 탭 ── */
  #wrong-tab-content { padding-top: 12px; }
  .wrong-empty {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: .95rem;
  }
  .wrong-empty span { font-size: 2.5rem; display: block; margin-bottom: 12px; }

  /* ── 통계 탭 ── */
  #stats-tab-content { padding: 24px 0; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; text-align: center;
  }
  .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--accent); }
  .stat-card .label { font-size: .78rem; color: var(--muted); margin-top: 4px; }
  .section-bar-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .section-bar-wrap h3 { font-size: .9rem; margin-bottom: 14px; color: var(--muted); }
  .section-row { margin-bottom: 10px; }
  .section-label { font-size: .8rem; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .sbar-outer { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .sbar-inner  { height: 100%; background: var(--accent); border-radius: 99px; transition: width .6s ease; }
  #restart-btn {
    display: block; margin: 24px auto 0;
    padding: 12px 36px; border-radius: 8px;
    background: var(--accent); color: #111;
    border: none; cursor: pointer;
    font-size: .95rem; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    transition: opacity .2s;
  }
  #restart-btn:hover { opacity: .85; }

  /* ── 반응형 ── */
  @media (max-width: 480px) {
    .q-sentence { font-size: .92rem; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>사회주의의 역사 — T/F 특훈 100제</h1>
  <p>수업 강의록 기반 · 개념 미묘한 차이 · 함정 설계 · 공산당 선언 포함</p>
</header>

<div id="progress-wrap">
  <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
  <div id="progress-text">0 / 100</div>
  <div id="score-display">
    <span class="sc-o">✓ <span id="sc-o">0</span></span>
    <span class="sc-x">✗ <span id="sc-x">0</span></span>
  </div>
</div>

<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('quiz')">📝 문제풀기</button>
  <button class="tab-btn" onclick="switchTab('wrong')">❌ 틀린 문제</button>
  <button class="tab-btn" onclick="switchTab('stats')">📊 통계</button>
</div>

<div id="main-container">
  <div id="quiz-tab-content"></div>

  <div id="wrong-tab-content" style="display:none">
    <div class="wrong-empty" id="wrong-empty">
      <span>🎉</span>아직 틀린 문제가 없어요!
    </div>
    <div id="wrong-list"></div>
  </div>

  <div id="stats-tab-content" style="display:none">
    <div class="stat-grid">
      <div class="stat-card"><div class="num" id="st-answered">0</div><div class="label">풀이 완료</div></div>
      <div class="stat-card"><div class="num" id="st-correct">0</div><div class="label">정답</div></div>
      <div class="stat-card"><div class="num" id="st-acc">—</div><div class="label">정확도</div></div>
      <div class="stat-card"><div class="num" id="st-wrong">0</div><div class="label">오답</div></div>
    </div>
    <div class="section-bar-wrap">
      <h3>📚 단원별 정답률</h3>
      <div id="section-bars"></div>
    </div>
    <button id="restart-btn" onclick="restartQuiz()">🔄 처음부터 다시</button>
  </div>
</div>

    concepts:["생산 수단 조합 소유","프루동 vs 국가주의자"],
    source:"4/1·4/6 강의 — 프루동 부조주의"
  }
];

// ══════════════════════════════════════════
//  전역 상태
// ══════════════════════════════════════════
let answered = new Array(101).fill(false); // 1-indexed
let results  = new Array(101).fill(null);  // true=정답, false=오답

function getStats(){
  let total=0,correct=0,wrong=0;
  for(let i=1;i<=100;i++){
    if(answered[i]){total++;if(results[i])correct++;else wrong++;}
  }
  return{total,correct,wrong,acc:total?Math.round(correct/total*100)+'%':'—'};
}

// ══════════════════════════════════════════
//  탭 전환
// ══════════════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['quiz','wrong','stats'][i]===tab);
  });
  document.getElementById('quiz-tab-content').style.display = tab==='quiz'?'block':'none';
  document.getElementById('wrong-tab-content').style.display= tab==='wrong'?'block':'none';
  document.getElementById('stats-tab-content').style.display= tab==='stats'?'block':'none';
  if(tab==='wrong') renderWrongTab();
  if(tab==='stats') renderStatsTab();
}

// ══════════════════════════════════════════
//  카드 렌더링
// ══════════════════════════════════════════
function renderCard(q, container){
  const div = document.createElement('div');
  div.className='q-card';
  div.id=`card-${q.id}`;

  div.innerHTML=`
    <div class="q-header">
      <span class="q-num">Q${q.id}</span>
      <span class="q-tag">${q.tag}</span>
      <span class="q-diff diff-${q.difficulty==='쉬움'?'easy':'hard'}">${q.difficulty==='쉬움'?'★':'★★★'}</span>
    </div>
    <div class="q-body">
      <p class="q-sentence">${q.sentence}</p>
    </div>
    <div class="q-actions">
      <button class="btn-tf btn-t" onclick="answer(${q.id},true)">T (참)</button>
      <button class="btn-tf btn-f" onclick="answer(${q.id},false)">F (거짓)</button>
    </div>
    <div class="q-explanation" id="exp-${q.id}">
      <div class="exp-box">
        <div class="exp-result" id="exp-result-${q.id}"></div>
        <div class="exp-answer">정답: ${q.answer?'T (참)':'F (거짓)'}</div>
        <div class="exp-text">${q.explanation}</div>
        <div class="exp-meta">
          ${q.concepts.map(c=>`<span class="exp-concept">💡 ${c}</span>`).join('')}
          <span class="exp-source">📖 ${q.source}</span>
        </div>
      </div>
    </div>`;
  container.appendChild(div);
}

// ══════════════════════════════════════════
//  답변 처리
// ══════════════════════════════════════════
function answer(id, userAnswer){
  if(answered[id]) return;
  answered[id]=true;
  const q = questions.find(x=>x.id===id);
  const isCorrect = userAnswer===q.answer;
  results[id]=isCorrect;

  // 카드 스타일
  const card=document.getElementById(`card-${id}`);
  card.classList.add(isCorrect?'answered-correct':'answered-wrong');

  // 버튼 스타일
  const btns=card.querySelectorAll('.btn-tf');
  btns.forEach(b=>b.disabled=true);
  const clickedBtn = card.querySelector(userAnswer?'.btn-t':'.btn-f');
  clickedBtn.classList.add(isCorrect?'selected-correct':'selected-wrong');
  if(!isCorrect){
    const correctBtn=card.querySelector(q.answer?'.btn-t':'.btn-f');
    correctBtn.classList.add('reveal-answer');
  }

  // 해설
  const exp=document.getElementById(`exp-${id}`);
  exp.classList.add('visible');
  const expResult=document.getElementById(`exp-result-${id}`);
  expResult.textContent=isCorrect?'✅ 정답입니다!':'❌ 오답입니다.';
  expResult.className=`exp-result ${isCorrect?'correct':'wrong'}`;

  updateProgress();
}

// ══════════════════════════════════════════
//  진행 바 업데이트
// ══════════════════════════════════════════
function updateProgress(){
  const {total,correct,wrong}=getStats();
  const pct=total/100*100;
  document.getElementById('progress-bar-inner').style.width=pct+'%';
  document.getElementById('progress-text').textContent=`${total} / 100`;
  document.getElementById('sc-o').textContent=correct;
  document.getElementById('sc-x').textContent=wrong;
}

// ══════════════════════════════════════════
//  틀린 문제 탭
// ══════════════════════════════════════════
function renderWrongTab(){
  const wrongIds=questions.filter(q=>answered[q.id]&&!results[q.id]).map(q=>q.id);
  const empty=document.getElementById('wrong-empty');
  const list=document.getElementById('wrong-list');
  list.innerHTML='';
  if(wrongIds.length===0){
    empty.style.display='block';
    return;
  }
  empty.style.display='none';
  wrongIds.forEach(id=>{
    const q=questions.find(x=>x.id===id);
    const div=document.createElement('div');
    div.className='q-card answered-wrong';
    div.innerHTML=`
      <div class="q-header">
        <span class="q-num">Q${q.id}</span>
        <span class="q-tag">${q.tag}</span>
      </div>
      <div class="q-body"><p class="q-sentence">${q.sentence}</p></div>
      <div class="q-explanation visible">
        <div class="exp-box">
          <div class="exp-result wrong">❌ 오답</div>
          <div class="exp-answer">정답: ${q.answer?'T (참)':'F (거짓)'}</div>
          <div class="exp-text">${q.explanation}</div>
          <div class="exp-meta">
            ${q.concepts.map(c=>`<span class="exp-concept">💡 ${c}</span>`).join('')}
            <span class="exp-source">📖 ${q.source}</span>
          </div>
        </div>
      </div>`;
    list.appendChild(div);
  });
}

// ══════════════════════════════════════════
//  통계 탭
// ══════════════════════════════════════════
function renderStatsTab(){
  const {total,correct,wrong,acc}=getStats();
  document.getElementById('st-answered').textContent=total;
  document.getElementById('st-correct').textContent=correct;
  document.getElementById('st-acc').textContent=acc;
  document.getElementById('st-wrong').textContent=wrong;

  // 단원별 정답률
  const sections=[...new Set(questions.map(q=>q.section))];
  const bars=document.getElementById('section-bars');
  bars.innerHTML='';
  sections.forEach(sec=>{
    const qs=questions.filter(q=>q.section===sec);
    const ans=qs.filter(q=>answered[q.id]);
    const cor=ans.filter(q=>results[q.id]);
    const pct=ans.length?Math.round(cor.length/ans.length*100):0;
    bars.innerHTML+=`
      <div class="section-row">
        <div class="section-label"><span>${sec}</span><span>${cor.length}/${ans.length} (${pct}%)</span></div>
        <div class="sbar-outer"><div class="sbar-inner" style="width:${pct}%"></div></div>
      </div>`;
  });
}

// ══════════════════════════════════════════
//  다시 시작
// ══════════════════════════════════════════
function restartQuiz(){
  answered=new Array(101).fill(false);
  results=new Array(101).fill(null);
  updateProgress();
  const container=document.getElementById('quiz-tab-content');
  container.innerHTML='';
  questions.forEach(q=>renderCard(q,container));
  switchTab('quiz');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════════════════════════
//  초기화
// ══════════════════════════════════════════
(function init(){
  const container=document.getElementById('quiz-tab-content');
  questions.forEach(q=>renderCard(q,container));
})();
</script>
